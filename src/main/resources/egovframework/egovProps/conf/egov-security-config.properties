# datasource
dataSource=dataSource

# login/logout
loginUrl=/uat/uia/egovLoginUsr.do
loginProcessUrl=/uat/uia/actionSecurityProcess.do
logoutUrl=/uat/uia/actionLogout.do
logoutSuccessUrl=/uat/uia/egovLoginUsr.do
loginFailureUrl=/uat/uia/actionSecurityLogin.do?login_error=1
accessDeniedUrl=/sec/ram/accessDenied.do

# user query
jdbcUsersByUsernameQuery=SELECT USER_ID, ESNTL_ID AS PASSWORD, 1 ENABLED, USER_NM, USER_ZIP, USER_ADRES, USER_EMAIL, USER_SE, '-' ORGNZT_ID, ESNTL_ID, '-' ORGNZT_NM FROM COMVNUSERMASTER WHERE CONCAT(USER_SE, USER_ID) = ?

# authority query
jdbcAuthoritiesByUsernameQuery=SELECT A.SCRTY_DTRMN_TRGET_ID USER_ID, A.AUTHOR_CODE AUTHORITY FROM LETTNEMPLYRSCRTYESTBS A, COMVNUSERMASTER B WHERE A.SCRTY_DTRMN_TRGET_ID = B.ESNTL_ID AND B.USER_ID = ?

# mapping class
jdbcMapClass=egovframework.let.uat.uia.service.impl.EgovSessionMapping

# request matcher
requestMatcherType=regex

# password hash
hash=plaintext
hashBase64=false

# session
concurrentMaxSessons=1
concurrentExpiredUrl=/uat/uia/actionMain.do
errorIfMaximumExceeded=false

# redirect
defaultTargetUrl=/uat/uia/actionMain.do
alwaysUseDefaultTargetUrl=true

# security headers
sniff=true
xframeOptions=SAMEORIGIN
xssProtection=true
cacheControl=false

# csrf
csrf=false
csrfAccessDeniedUrl=/uat/uia/actionMain.do

# permit url
permitAllList=/css/**, /html/**, /images/**, /js/**, /resource/**, /uat/uia/**, /cmm/**, /sym/mms/**

# role hierarchy
sqlHierarchicalRoles=SELECT a.CHLDRN_ROLE child, a.PARNTS_ROLE parent FROM LETTNROLES_HIERARCHY a LEFT JOIN LETTNROLES_HIERARCHY b ON (a.CHLDRN_ROLE = b.PARNTS_ROLE)

# url role
sqlRolesAndUrl=SELECT a.ROLE_PTTRN url, b.AUTHOR_CODE authority FROM LETTNROLEINFO a, LETTNAUTHORROLERELATE b WHERE a.ROLE_CODE = b.ROLE_CODE AND a.ROLE_TY = 'url' ORDER BY a.ROLE_SORT

# regex role
sqlRegexMatchedRequestMapping=SELECT a.ROLE_PTTRN uri, b.AUTHOR_CODE authority FROM LETTNROLEINFO a, LETTNAUTHORROLERELATE b WHERE a.ROLE_CODE = b.ROLE_CODE AND a.ROLE_TY = 'regex' ORDER BY a.ROLE_SORT